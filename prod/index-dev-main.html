<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title><%=@PRODUCTNAME%></title>
    <meta name="thinfinity-postdata" data-name="betaV7" data-value="<%=@WebV7%>" />
    <meta name="thinfinity-postdata" data-name="productName" data-value="<%=@PRODUCTNAME%>" />
    <meta name="thinfinity-postdata" data-name="productVersion" data-value="<%=$VERSION%>" />
    <meta name="thinfinity-postdata" data-name="gwsid" data-value="<%=@GWSID%>" />
    <meta name="thinfinity-postdata" data-name="authUsername" data-value="<%=@AUTH_USERNAME%>" />
    <meta name="thinfinity-postdata" data-name="authAccessKey" data-value="<%=@AUTH_ACCESSKEY%>" />
    <meta name="thinfinity-postdata" data-name="brkVer" data-value="<%=@BRKVER%>" />
    <meta name="thinfinity-postdata" data-name="totpAuthentication" data-value="<%=#totpauthentication%>" />
    <meta name="thinfinity-postdata" data-name="oauth" data-value="<%=#oauth%>" />
    <meta name="thinfinity-postdata" data-name="language" data-value="<%=$LANGUAGE%>" />
    <meta name="thinfinity-detection" data-name="HTMLREQUESTPATH" data-value="<%=@REQUESTPATH%>" />
    <link rel="manifest" href="<%=@BASEURL%>workspace/public/app.webmanifest" />
    <link rel="icon" href="<%=@BASEURL%>favicon.ico" />
    <link rel="apple-touch-icon" href="<%=@BASEURL%>images/icon.png" />
    <link rel="stylesheet" type="text/css" href="<%=@BASEURL%>workspace/assets/style.css" />
    <!-- Thinfinity.JSMinified combine="no" compress="no" -->
    <script src="<%=@BASEURL%>common/js/global.variables.js" type="text/javascript"></script>
    <script src="<%=@BASEURL%>__base__/config/websettings" type="text/javascript"></script>
    <script type="module" src="<%=@BASEURL%>workspace/assets/workspace.core.define.js"></script>
    <script type="module" src="<%=@BASEURL%>workspace/mainAaaS.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
